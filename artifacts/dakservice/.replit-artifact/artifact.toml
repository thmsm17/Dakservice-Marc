kind = "web"
previewPath = "/"
title = "Dakservice Marc van Tankeren"
version = "1.0.0"
id = "artifacts/dakservice"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23840
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/dakservice run dev"

[services.env]
PORT = "23840"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/dakservice", "run", "build"]
publicDir = "artifacts/dakservice/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
